# Cluster
cluster_name: eks-test-cluster
aws_region:   us-east-1

# Namespaces (mirrors company setup)
loki_namespace:       loki-live
grafana_namespace:    grafana
monitoring_namespace: monitoring
roboshop_namespace:   roboshop

# Grafana
grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('changeme', true) }}"

# Loki S3 — set by GitHub Actions from terraform output
# Override locally: ansible-playbook -e "loki_s3_bucket=<bucket> loki_iam_role_arn=<arn>"
loki_s3_bucket:    "{{ lookup('env', 'LOKI_S3_BUCKET') | default('', true) }}"
loki_iam_role_arn: ""   # injected at runtime from terraform output

# Roboshop image tags
roboshop_images:
  catalogue: praveen538/catalogue:v1
  cart:      praveen538/cart:v1
  user:      praveen538/user:v1
  payment:   praveen538/payment:v1
  shipping:  praveen538/shipping:v1
  mongodb:   praveen538/mongo:v1
  mysql:     praveen538/mysql:v1
  redis:     redis
  rabbitmq:  rabbitmq
  web:       praveen538/web:v1
