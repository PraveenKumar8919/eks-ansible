# Cluster
cluster_name: eks-test-cluster
aws_region:   us-east-1

# Namespaces (mirrors company setup)
loki_namespace:       loki-live
grafana_namespace:    grafana
monitoring_namespace: monitoring
roboshop_namespace:   roboshop

# Domain
domain_name: devopswithpraveen.online

# Secrets — pulled from env vars (set via GitHub Secrets in CI, or shell env locally)
grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('DevOps@2025', true) }}"

mysql_root_password: "DevOps@2025"
mysql_password:      "DevOps@2025"

rabbitmq_user:     "roboshop"
rabbitmq_password: "DevOps@2025"

payment_amqp_user: "roboshop"
payment_amqp_pass: "DevOps@2025"

# Infrastructure values — injected at runtime from terraform outputs (not secrets)
loki_s3_bucket:              "{{ lookup('env', 'LOKI_S3_BUCKET') | default('', true) }}"
loki_iam_role_arn:           ""
vpc_id:                      "{{ lookup('env', 'VPC_ID') | default('', true) }}"
acm_certificate_arn:         "{{ lookup('env', 'ACM_CERT_ARN') | default('', true) }}"
alb_controller_iam_role_arn: "{{ lookup('env', 'ALB_CONTROLLER_ROLE_ARN') | default('', true) }}"
externaldns_iam_role_arn:    "{{ lookup('env', 'EXTERNALDNS_ROLE_ARN') | default('', true) }}"

# Roboshop image tags
roboshop_images:
  catalogue: praveen538/catalogue:v1
  cart:      praveen538/cart:v1
  user:      praveen538/user:v1
  payment:   praveen538/payment:v1
  shipping:  praveen538/shipping:v1
  mongodb:   praveen538/mongo:v1
  mysql:     praveen538/mysql:v1
  redis:     redis
  rabbitmq:  rabbitmq
  web:       praveen538/web:v1
