---
- name: Add Prometheus community Helm repo
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts

- name: Install kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
  kubernetes.core.helm:
    name: kube-prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: "{{ grafana_namespace }}"
    create_namespace: true
    wait: true
    timeout: "10m"
    values:
      grafana:
        adminPassword: "{{ grafana_admin_password }}"
        service:
          type: ClusterIP
        ingress:
          enabled: true
          ingressClassName: alb
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/group.name: observability
            alb.ingress.kubernetes.io/certificate-arn: "{{ acm_certificate_arn }}"
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
            alb.ingress.kubernetes.io/ssl-redirect: "443"
            external-dns.alpha.kubernetes.io/hostname: "grafana.{{ domain_name }}"
          hosts:
            - "grafana.{{ domain_name }}"
        additionalDataSources:
          - name: Loki
            type: loki
            url: "http://loki.{{ loki_namespace }}.svc.cluster.local:3100"
            access: proxy
            isDefault: false

      prometheus:
        prometheusSpec:
          enableRemoteWriteReceiver: true
        ingress:
          enabled: true
          ingressClassName: alb
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/group.name: observability
            alb.ingress.kubernetes.io/certificate-arn: "{{ acm_certificate_arn }}"
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
            alb.ingress.kubernetes.io/ssl-redirect: "443"
            external-dns.alpha.kubernetes.io/hostname: "prometheus.{{ domain_name }}"
          hosts:
            - "prometheus.{{ domain_name }}"
