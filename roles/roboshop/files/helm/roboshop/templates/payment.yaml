apiVersion: v1
kind: Secret
metadata:
  name: payment
  namespace: roboshop
type: Opaque
stringData:
  AMQP_USER: {{ .Values.secrets.payment.amqpUser | quote }}
  AMQP_PASS: {{ .Values.secrets.payment.amqpPass | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: {{ .Values.images.payment }}
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: payment
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
spec:
  selector:
    app: payment
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
